tosca_definitions_version: tosca_2_0

description: SZTAKI OpenStack Capacity Def

metadata:
  name: cap-os-sztaki
  author: University of Westminster
  date: 2026-03-04
  version: 0.1
  tags:
  - provider: sztaki

imports:
- namespace: swch
  url: https://raw.githubusercontent.com/Swarmchestrate/tosca/refs/heads/main/profiles/eu.swarmchestrate/profile.yaml

node_types:

  sztaki-capacity:
    derived_from: swch:OverallCapacity
    capabilities:
      capacity:
        properties:
            num-cpus:
              default: 10
            mem-size:
              default: 20
            disk-size:
              default: 256

  OpenStackBase:
    derived_from: swch:Capacity
    description: >
      An base compute node from the SZTAKI provision
    properties:
      image_id:
        type: string
        required: true
        description: >
          The ID of the image used to launch the instance.
        default: 4271ec99-6cda-458f-8fe5-38205ea2d3b3
      project_id:
        type: string
        required: false
        description: >
          OpenStack project ID
      network_id:
        type: string
        required: true
        description: >
          The ID of the network connected by this instance
        default: bbe042e4-91a1-4601-962f-14a31e5e2787
      flavor_name:
        type: string
        required: true
        description: >
          The type of OpenStack instance (e.g., m2.medium) specifying compute resources.
      key_name:
        type: string
        required: false
        description: >
          The name of the SSH key pair used to access the instance.
        default: g
      security_groups:
        type: list
        required: false
        entry_schema: string
        description: >
          A list of security group IDs that control inbound and outbound traffic for the instance.
      volume_size:
        type: integer
        required: true
        description: >
          Size of instance disk volume in GB
        default: 10
      use_block_device:
        type: boolean
        required: true
        description: >
          Force block device usage for volumes
        default: true
    capabilities:
      host:
        properties:
          disk-size:
            default: 10
          bandwidth:
            default: 1000
      os:
        properties:
          type:
            default: linux
          version:
            default: "24.04"
          distribution:
            default: ubuntu
      resource:
        properties:
          provider:
            default: SZTAKI
          capacity-provider:
            default: SZTAKI
          type:
            default: cloud
      network:
        properties:
          ipv4_enabled:
            default: True
          ipv6_enabled:
            default: False
          type:
            default: ethernet
      pricing:
        properties:
          cost:
            default: 0.00
      locality:
        properties:
          continent:
            default: Europe
          country:
            default: Hungary
          city:
            default: Budapest
      energy:
        properties:
          powered-type:
            default: mains-powered
          energy-type:
            default: non-green


    m2-small:
      derived_from: OpenStackBase
      properties:
        flavor_name:
          default: m2.small
      capabilities:
        host:
          properties:
            num-cpus: 
              default: 1
            mem-size:
              default: 2
        energy:
          properties:
            consumption: 
              default: 0.10

    m2-medium:
      derived_from: OpenStackBase
      properties:
        flavor_name:
          default: m2.medium
      capabilities:
        host:
          properties:
            num-cpus:
              default: 2
            mem-size:
              default: 4
        energy:
          properties:
            consumption: 
              default: 0.10

    m2-large:
      derived_from: OpenStackBase
      properties:
        flavor_name:
          default: m2.large
      capabilities:
        host:
          properties:
            num-cpus: 
              default: 4
            mem-size:
              default: 8
        energy:
          properties:
            consumption: 
              default: 0.10