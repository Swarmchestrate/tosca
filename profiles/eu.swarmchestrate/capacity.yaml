##########################################################################
# This file contains MiCADO Profile Capacity type definitions.
##########################################################################

tosca_definitions_version: tosca_2_0

profile: eu.swarmchestrate:0.1

metadata:
  template_name: capacity.yaml
  template_author: University of Westminster
  template_version: 0.1

description: MiCADO Profile capacity type definitions

capability_types:
  HostCap:
    properties:
      num-cpus:
        type: integer
        required: true
        description: Number of vCPUs
      mem-size:
        type: integer
        required: true
        description: Memory size (GB)
      disk-size:
        type: integer
        required: true
        description: Disk size (GB)
      bandwidth:
        type: integer
        required: true
        description: Network bandwidth (Mbps)
      architecture:
        type: string
        required: false
        description: CPU architecture (e.g., x86_64, arm64)

  CapacityInstanceCap:
    properties:
      instances:
        type: integer
        required: false
        description: >
          Number of instances of this type offered by the capacity 

  CapacityCap:
    properties:
      num-cpus:
        type: integer
        required: false
        description: Number of vCPUs offered by the capacity
      mem-size:
        type: integer
        required: false
        description: Memory size (GB) offered by the capacity
      disk-size:
        type: integer
        required: false
        description: Disk size (GB) offered by the capacity
      bandwidth:
        type: integer
        required: false
        description: Network bandwidth (Mbps) offered by the capacity

  OSCap:
    properties:
      type:
        type: string
        required: true
        description: Operating system type (e.g. Linux, Windows)
      version:
        type: string
        required: true
        description: Operating system version
      distribution:
        type: string
        required: true
        description: Operating system distribution (e.g. Ubuntu, Amazon Linux)

  NetworkCap:
    properties:
      type:
        type: string
        required: true
        description: Network type (e.g. 4G, 5G, Ethernet)
      ipv6_enabled:
        type: boolean
        required: true
        description: Whether IPv6 is enabled
      ipv4_enabled:
        type: boolean
        required: true
        description: Whether IPv4 is enabled
      subnet:
        type: string
        required: false
        description: Subnet CIDR

  ResourceCap:
    properties:
      provider:
        type: string
        required: true
        description: Resource provider. Typically a cloud provider or, in the case of edge, an organisation (e.g. aws, openstack, uow)
      capacity-provider:
        type: string
        required: true
        description: Capacity provider, always an organisation (e.g. uow, sztaki, fuelics)
      type:
        type: string
        required: true
        description: Resource type (e.g. cloud, edge)
      compute:
        type: string
        required: true
        description: Compute service type (e.g., nova, ec2)
      labels:
        type: map
        required: false
        entry_schema: string
        description: Any labels associated with the resource

  PricingCap:
    properties:
      cost:
        type: float
        required: true
        description: Cost per hour in EUR

  LocalityCap:
    properties:
      continent:
        type: string
        required: true
        description: Continent where the resource is located
      country:
        type: string
        required: true
        description: Country where the resource is located
      city:
        type: string
        required: true
        description: City where the resource is located

  EnergyCap:
    properties:
      consumption:
        type: float
        required: true
        description: Energy consumption in watts per hour
      powered-type:
        type: string
        required: false
        description: Type of power used (e.g., renewable, non-renewable)
      energy-type:
        type: string
        required: false
        description: Specific type of energy (e.g., solar, wind, coal)

  TrustCap:
    properties:
      level:
        type: float
        required: true
        description: Trust level
        default: 0.5


node_types:
  
  OverallCapacity:
    description: >
      Used for specfying the total available resource offered from a capacity.
    capabilities:
      capacity:
        description: >
          Available raw compute resources (vCPUs, memory, disk, bandwidth).
        type: CapacityCap

  Capacity:
    description: >
      The base type for capacity nodes, representing a provider's offering.
    capabilities:
      host:
        description: >
          Used to specify the hardware specification of a specific instance flavour
          in a capacity.
        type: HostCap
      capacity:
        description: >
          Used to specify the available resource offered from a capacity, in terms
          of number of instances of a given flavour.
        type: CapacityInstanceCap
      os:
        description: >
          Used to specify the operating system of a specific instance flavour in
          a capacity.
        type: OSCap
      network:
        description: >
          Used to specify network information of a specific instance flavour in
          a capacity.
        type: NetworkCap
      resource:
        description: >
          Used to specify higher-level information about the instance flavour being
          offered by the capacity.
        type: ResourceCap
      pricing:
        description: >
          Used to specify the cost of a specific instance flavour in a capacity.
        type: PricingCap
      locality:
        description: >
          Used to specify the location of a specific instance flavour in a capacity.
        type: LocalityCap
      energy:
        description: >
          Used to specify the energy consumption of a specific instance flavour in a capacity.
        type: EnergyCap
      trust:
        description: >
          Used to specify the trust level of a specific instance flavour in a capacity.
        type: TrustCap      
  
  CloudCapacity:
    description: >
      The Swarmchestrate Cloud Capacity Node
    derived_from: Capacity

    capabilities:
      resource:
        properties:
          type:
            description: >
              Setting a default, knowing that all instances of this type will be cloud-based.
            default: cloud

  EdgeCapacity:
    description: >
      The Swarmchestrate Edge Capacity Node
    derived_from: Capacity
    properties:
      ip:
        type: string
        required: false
        description: IP of edge node
        
      credentials:
        type: map
        required: false
        description: Map of credentials (e.g. token, basic auth)
        entry_schema: string

    capabilities:
      resource:
        properties:
          type:
            description: >
              Setting a default, knowing that all instances of this type will be edge-based.
            default: edge
          compute:
            description: >
              Setting the default to edge, as above.
            default: edge

  OpenStackCapacity:
    derived_from: CloudCapacity
    description: >
      A Nova compute node from OpenStack
    properties:
      image_id:
        type: string
        required: true
        description: >
          The ID of the image used to launch the instance.
      network_id:
        type: string
        required: true
        description: >
          The ID of the network connected by this instance
      flavor_name:
        type: string
        required: true
        description: >
          The type of OpenStack instance (e.g., m2.medium) specifying compute resources.
      volume_size:
        type: integer
        required: true
        description: >
          Size of instance disk volume in GB
      project_id:
        type: string
        required: false
        description: >
          OpenStack project ID
      key_name:
        type: string
        required: false
        description: >
          The name of the SSH key pair used to access the instance.
      security_groups:
        type: list
        required: false
        entry_schema: string
        description: >
          A list of security group IDs that control inbound and outbound traffic for the instance.

    capabilities:
      resource:
        properties:
          compute:
            description: >
              Setting a default, given that OpenStack Nova is providing the compute.
            default: nova

  EC2Capacity:
    derived_from: CloudCapacity
    description: >
      An base EC2 compute node from AWS
    properties:
      ami:
        type: string
        required: true
        description: >
          The Amazon Machine ID of the image used to launch the instance.
      instance_type:
        type: string
        required: true
        description: >
          The AWS instance type (e.g., t2.micro) specifying compute resources.
      key_name:
        type: string
        required: false
        description: >
          The name of the SSH key pair used to access the instance.
      security_groups:
        type: list
        required: false
        entry_schema: string
        description: >
          A list of security group IDs that control inbound and outbound traffic for the instance.

    capabilities:
      resource:
        properties:
          compute:
            description: >
              Setting a default, given that AWS EC2 is providing the compute.
            default: ec2
